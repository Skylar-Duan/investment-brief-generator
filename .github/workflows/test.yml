name: Test

on:
  push:
    branches: [ main, 'claude/**' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests and generate report
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
        run: |
          mkdir -p test-results ci-output
          LOG=test-results/latest.log

          echo "===== TEST RUN: $(date -u) =====" > $LOG
          echo "Commit: $GITHUB_SHA" >> $LOG
          echo "" >> $LOG

          echo "--- API Test ---" >> $LOG
          python test_apis.py >> $LOG 2>&1 && echo "[PASS] test_apis" >> $LOG || echo "[FAIL] test_apis" >> $LOG

          echo "" >> $LOG
          echo "--- AAPL Report ---" >> $LOG
          timeout 120 python main.py AAPL >> $LOG 2>&1 && echo "[PASS] main.py AAPL" >> $LOG || echo "[FAIL] main.py AAPL" >> $LOG

          # Copy generated HTML to ci-output so it persists in repo
          cp -r output/. ci-output/ 2>/dev/null || true

          echo "" >> $LOG
          echo "===== END =====" >> $LOG
          cat $LOG
        continue-on-error: true

      - name: Commit results
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin claude/project-review-questions-15uuM
          git reset --soft origin/claude/project-review-questions-15uuM
          git add test-results/latest.log ci-output/
          if ! git diff --staged --quiet; then
            git commit -m "ci: update test results [skip ci]"
            git push origin HEAD:claude/project-review-questions-15uuM
          fi
