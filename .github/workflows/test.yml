name: Test

on:
  push:
    branches: [ main, 'claude/**' ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests and capture results
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
        run: |
          mkdir -p test-results
          echo "===== TEST RUN: $(date -u) =====" > test-results/latest.log
          echo "Commit: ${{ github.sha }}" >> test-results/latest.log
          echo "" >> test-results/latest.log
          echo "--- API Connection Test ---" >> test-results/latest.log
          python test_apis.py >> test-results/latest.log 2>&1 || echo "[FAILED] test_apis.py" >> test-results/latest.log
          echo "" >> test-results/latest.log
          echo "--- Generate AAPL Report ---" >> test-results/latest.log
          python main.py AAPL >> test-results/latest.log 2>&1 || echo "[FAILED] main.py AAPL" >> test-results/latest.log
          echo "" >> test-results/latest.log
          echo "===== END =====" >> test-results/latest.log
        continue-on-error: true

      - name: Commit test results
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin claude/project-review-questions-15uuM
          git add test-results/latest.log
          git diff --staged --quiet || git commit -m "ci: update test results [skip ci]"
          git push

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aapl-report
          path: output/
          if-no-files-found: warn
